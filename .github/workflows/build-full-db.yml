name: Build Full Database

on:
  workflow_dispatch:

concurrency:
  group: sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Install dependencies
        run: nix develop --command npm ci

      - name: Sync all Elm packages (batched)
        run: |
          BATCH=0
          while true; do
            BATCH=$((BATCH + 1))
            echo "=== Elm packages batch $BATCH ==="
            OUTPUT=$(nix develop --command npm run sync-elm-packages -- --db ./elm-packages-sync.db --limit 100 2>&1)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "0 package version(s) to download"; then
              echo "All packages synced"
              break
            fi
          done

      - name: Sync all GitHub metadata (batched)
        run: |
          BATCH=0
          while true; do
            BATCH=$((BATCH + 1))
            echo "=== GitHub metadata batch $BATCH ==="
            OUTPUT=$(nix develop --command npm run sync-github -- --db ./elm-packages-sync.db --limit 100 2>&1)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "0 package(s) to fetch"; then
              echo "All GitHub metadata synced"
              break
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release if needed
        if: '!cancelled()'
        run: |
          gh release create packages --title "Package Database" --notes "Pre-built Elm package database" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload source DB (always)
        if: '!cancelled()'
        run: |
          if [ -f elm-packages-sync.db ]; then
            mkdir -p artifacts
            zstd -f elm-packages-sync.db -o artifacts/elm-packages-sync.db.zst
            gh release upload packages artifacts/elm-packages-sync.db.zst --clobber
            echo "Source DB uploaded"
          else
            echo "No source DB to upload"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate and upload release artifacts
        run: |
          nix develop --command node scripts/ci/generate-artifacts.mjs \
            --source-db ./elm-packages-sync.db \
            --out ./artifacts

          gh release upload packages \
            artifacts/manifest.json \
            --clobber

          if [ -f artifacts/elm-packages.db.zst ]; then
            gh release upload packages \
              artifacts/elm-packages.db.zst \
              artifacts/elm-packages-delta.json.zst \
              artifacts/metadata.json \
              --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
