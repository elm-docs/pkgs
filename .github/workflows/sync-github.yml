name: Sync GitHub Metadata

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v8
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Install dependencies
        run: nix develop --command npm ci

      - name: Download current DB from release
        run: |
          mkdir -p artifacts
          gh release download packages -D artifacts \
            -p 'elm-packages.db.zst' 2>/dev/null || {
            echo "No existing release — cannot sync GitHub metadata without a DB"
            exit 1
          }
          zstd -d artifacts/elm-packages.db.zst -o elm-packages.db
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync GitHub metadata
        run: nix develop --command npm run sync-github -- --db ./elm-packages.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release artifacts
        run: |
          nix develop --command node scripts/ci/generate-artifacts.mjs \
            --db ./elm-packages.db \
            --out ./artifacts

      - name: Upload release artifacts
        run: |
          gh release upload packages \
            artifacts/elm-packages.db.zst \
            artifacts/metadata.json \
            artifacts/manifest.json \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
